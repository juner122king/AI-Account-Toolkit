name = "freemail"
main = "src/server.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "replace-with-your-d1-name"
database_id = "replace-with-your-d1-database-id"
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# MAIL_DOMAIN = "mail.example.com"
# ADMIN_NAME = "admin"
# SESSION_EXPIRE_DAYS = "7"
# FORWARD_RULES = "vip=a@example.com,*=fallback@example.com"


# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "replace-with-your-r2-bucket-name"

# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true


